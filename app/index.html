<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI-OS"><link rel="apple-touch-icon" href="../icon.png"><link rel="manifest" href="manifest.webmanifest">
<title>AI-OS</title>
<style>
:root{--bg:#07100e;--ink:#f2eee4;--muted:#a6aca5;--line:rgba(255,255,255,.12);--jade:#61d7a1;--gold:#dfbd78;--fog:#68726d;--red:#e27665;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#050b09;color:var(--ink);font-family:Inter,"Segoe UI",sans-serif}body{overflow:hidden}
#app{height:100dvh;max-width:1000px;margin:auto;display:grid;grid-template-rows:auto 1fr auto;background:radial-gradient(circle at 50% 18%,#18372d 0,#0a1713 34%,#050b09 76%)}
header{display:flex;align-items:center;justify-content:space-between;padding:max(15px,env(safe-area-inset-top)) 18px 10px;z-index:5}h1{font:600 21px Georgia,serif;margin:0}.status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px}.dot{width:7px;height:7px;border-radius:50%;background:var(--fog)}.online .dot{background:var(--jade);box-shadow:0 0 9px var(--jade)}.retrying .dot{background:var(--gold);animation:pulse 1s infinite}@keyframes pulse{50%{opacity:.35}}
main{position:relative;overflow:auto;padding:0 16px 22px}.view{display:none;min-height:100%}.view.active{display:block}.eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.world{position:relative;min-height:calc(100dvh - 150px);overflow:hidden;border:1px solid var(--line);border-radius:24px;background:radial-gradient(circle at 50% 52%,rgba(71,177,132,.16),transparent 30%),linear-gradient(160deg,rgba(255,255,255,.035),transparent 45%)}
.world:before{content:"";position:absolute;inset:0;opacity:.18;background-image:linear-gradient(30deg,transparent 48%,rgba(255,255,255,.08) 49%,transparent 50%),linear-gradient(-30deg,transparent 48%,rgba(255,255,255,.06) 49%,transparent 50%);background-size:72px 72px}
.beacon{position:absolute;top:7%;left:50%;transform:translateX(-50%);text-align:center}.beacon b{display:block;color:var(--gold);font:600 16px Georgia}.beacon span{font-size:11px;color:var(--muted)}
.region{position:absolute;border:1px solid var(--line);background:rgba(7,20,16,.88);color:var(--ink);border-radius:50%;width:184px;height:184px;padding:19px;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 20px 50px rgba(0,0,0,.35)}.region.primary{left:50%;top:43%;transform:translate(-50%,-50%);border-color:rgba(97,215,161,.7);box-shadow:0 0 0 8px rgba(97,215,161,.04),0 20px 50px #000}.region h2{font:600 19px Georgia;margin:3px 0}.region p{font-size:11px;color:var(--muted);margin:0}.region .progress{font:700 23px Georgia;color:var(--jade)}
.fogbank{position:absolute;left:12%;right:12%;bottom:9%;display:block}.fog{min-height:64px;border:1px dashed rgba(255,255,255,.13);border-radius:16px;padding:12px 16px;background:rgba(80,91,86,.09);color:#818a85;text-align:left}.fog b{display:block;font-size:12px}.fog span{font-size:10px}
.panel{max-width:620px;margin:8px auto 0}.hero{padding:22px;border:1px solid var(--line);border-radius:20px;background:rgba(13,27,22,.85)}.hero h2{font:600 25px Georgia;margin:7px 0}.hero p{color:var(--muted);line-height:1.5}.metric{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:12px 0;border-top:1px solid var(--line)}.metric span{flex:none}.metric b{color:var(--jade);text-align:right;overflow-wrap:anywhere;max-width:68%}.tap{display:block;margin-top:8px;font-size:10px;color:var(--jade);letter-spacing:.08em;text-transform:uppercase}
.card{margin-top:12px;padding:18px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.035)}.card h3{font:600 18px Georgia;margin:0 0 7px}.card p{color:var(--muted);margin:0;line-height:1.45}.proof{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}.proof:last-child{border:0}.state{font-size:11px;text-transform:uppercase;color:var(--jade)}
.empty{text-align:center;padding:46px 18px}.empty h2{font:600 26px Georgia}.empty p{color:var(--muted);line-height:1.55}.question{margin-top:12px}.question button,.action{width:100%;min-height:50px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.05);color:var(--ink);font-size:15px;margin-top:9px}.question input{width:100%;min-height:50px;background:#07100e;border:1px solid var(--line);border-radius:13px;color:var(--ink);padding:12px;font-size:16px}
nav{display:grid;grid-template-columns:repeat(3,1fr);padding:8px 12px calc(8px + var(--safe));border-top:1px solid var(--line);background:rgba(5,11,9,.96);backdrop-filter:blur(15px);z-index:6}nav button{border:0;background:transparent;color:#7f8983;min-height:48px;font-size:12px}nav button.active{color:var(--jade)}nav b{display:block;font-size:18px;margin-bottom:2px}
#pair,#fatal{display:none;position:fixed;inset:0;background:#050b09;z-index:20;padding:24px;align-items:center;justify-content:center;text-align:center}#pair.show,#fatal.show{display:flex}#pair a,#fatal button{display:block;margin-top:18px;padding:14px 20px;border-radius:13px;background:var(--jade);color:#07100e;text-decoration:none;border:0;font-weight:700}
@media(min-width:700px){.world{min-height:650px}.fogbank{left:16%;right:16%}.region{width:190px;height:190px}}
</style></head><body>
<div id="app">
<header><h1>AI-OS</h1><div id="connection" class="status"><span class="dot"></span><span>connecting</span></div></header>
<main>
<section id="world" class="view active" data-view="world"><div class="world">
<div class="beacon"><b>Family Security</b><span>north star · recurring capacity</span></div>
<button id="primary-region" class="region primary" aria-label="Open Frontier Lab focus"><span class="eyebrow">active region</span><h2>Frontier Lab</h2><div class="progress" id="world-progress">—</div><p id="world-state">loading sourced truth</p></button>
<div id="fogbank" class="fogbank"></div>
</div></section>
<section id="decisions" class="view" data-view="decisions"><div id="decision-stage" class="panel"></div></section>
<section id="focus" class="view" data-view="focus"><div id="focus-stage" class="panel"></div></section>
</main>
<nav aria-label="AI-OS views"><button data-go="world" class="active"><b>⌂</b>World</button><button data-go="decisions"><b>◇</b>Decisions</button><button data-go="focus"><b>◎</b>Focus</button></nav>
</div>
<div id="pair"><div><h2>Reconnect this phone</h2><p>Pair once through the trusted AI-OS launcher.</p><a href="../#app">Open pairing</a></div></div>
<div id="fatal"><div><h2>AI-OS is reconnecting</h2><p>The app stayed open. Your work is safe.</p><button id="retry">Try now</button></div></div>
<script>
"use strict";
const TOKEN_KEY="aios_token"; const CAMPAIGN="frontier-lab-acceptance";
const S={base:"",token:"",app:null,cards:null,view:"world",busy:false};
const $=s=>document.querySelector(s);
function connection(mode,text){const e=$("#connection");e.className="status "+mode;e.lastElementChild.textContent=text}
async function discover(){const r=await fetch("../url.json?x="+Date.now(),{cache:"no-store"});if(!r.ok)throw Error("route unavailable");const d=await r.json();const tok=localStorage.getItem(TOKEN_KEY);if(!tok){$("#pair").classList.add("show");throw Error("pairing required")}S.base=String(d.url||"").replace(/\/+$/,"");S.token=tok;return S.base}
async function api(path,opts={}){let last;for(let attempt=0;attempt<2;attempt++){try{if(!S.base||attempt)await discover();const ctl=new AbortController();const timer=setTimeout(()=>ctl.abort(),8000);const r=await fetch(S.base+path,{...opts,headers:{"Content-Type":"application/json","X-AIOS-Token":S.token,...(opts.headers||{})},signal:ctl.signal});clearTimeout(timer);if(!r.ok)throw Error("HTTP "+r.status);connection("online","connected");return await r.json()}catch(e){last=e;S.base="";connection("retrying","reconnecting");if(attempt===0)await new Promise(r=>setTimeout(r,350))}}throw last}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function show(view,push=true){if(!["world","decisions","focus"].includes(view))view="world";S.view=view;document.querySelectorAll(".view").forEach(e=>e.classList.toggle("active",e.id===view));document.querySelectorAll("nav button").forEach(e=>e.classList.toggle("active",e.dataset.go===view));if(push&&location.hash!=="#"+view)history.pushState({view},"","#"+view);if(view==="decisions")renderDecisions();if(view==="focus")renderFocus()}
function renderWorld(){const p=S.app.primary_region;$("#world-progress").textContent=p.decision_progress.answered+"/"+p.decision_progress.total;$("#world-state").innerHTML=esc(p.plain_language)+`<span class="tap">tap for proof &amp; next action</span>`;const fog=(S.app.regions||[]).filter(r=>r.fogged);$("#fogbank").innerHTML=`<div class="fog"><b>${fog.length} regions remain in honest fog</b><span>${fog.map(r=>esc(r.label)).join(" · ")}</span></div>`}
function renderFocus(){if(!S.app)return;const p=S.app.primary_region,src=S.app.source_status||{};$("#focus-stage").innerHTML=`<div class="hero"><span class="eyebrow">current diagnosis · ${esc(p.epistemic_state)}</span><h2>${esc(p.plain_language)}</h2><p>${esc(p.next_automatic_action)}</p><div class="metric"><span>Owner needed</span><b>${esc(p.owner_need)}</b></div><div class="metric"><span>Deadline</span><b>${esc(p.deadline)}</b></div></div><div class="card"><h3>Proof</h3>${(p.proof||[]).map(x=>`<div class="proof"><span>${esc(x.label)}</span><span class="state">${esc(x.state)}${x.count!=null?" · "+x.count+"/"+x.expected:""}</span></div>`).join("")}</div><div class="card"><h3>Source check</h3><div class="proof"><span>Decision ledger</span><span class="state">${esc(src.question_state)}</span></div><div class="proof"><span>World snapshot</span><span class="state">${esc(src.stewardship_snapshot)}</span></div><div class="proof"><span>Checked</span><span class="state">${esc((S.app.generated_at||"").replace("T"," ").slice(0,19))+"Z"}</span></div></div>`}
async function renderDecisions(){const stage=$("#decision-stage");stage.innerHTML=`<div class="empty"><p>Loading decisions…</p></div>`;try{const d=await api("/api/cards?campaign="+CAMPAIGN);S.cards=d;const cards=d.cards||[];if(!cards.length){stage.innerHTML=`<div class="empty"><span class="eyebrow">owner truth</span><h2>${d.answered||0}/${d.total||0} complete</h2><p>Nothing is waiting on you. AI-OS is reconciling your decisions into the application packet.</p></div>`;return}renderCard(cards[0])}catch(e){stage.innerHTML=`<div class="empty"><h2>Still reconnecting</h2><p>This view stayed open. No response was lost.</p><button class="action" id="dec-retry">Try again</button></div>`;$("#dec-retry").onclick=renderDecisions}}
function optionAnswer(o){return /^(yes|no)$/i.test(String(o.k))?String(o.k):String(o.k)+": "+String(o.label||o.k)}
function renderCard(card){const stage=$("#decision-stage");const options=card.answer_type==="yesno"?(card.yes_only?[{k:"yes",label:"Yes — I approve"}]:[{k:"yes",label:"Yes"},{k:"no",label:"No"}]):(card.options||[]);const multi=card.answer_type==="multi";const choices=multi?options.map(o=>`<label class="action" style="display:flex;align-items:center;gap:10px;padding:12px"><input type="checkbox" data-multi="${esc(optionAnswer(o))}"> ${esc(o.label||o.k)}</label>`).join("")+`<button class="action" id="submit-multi">Confirm selection</button>`:options.map(o=>`<button data-value="${esc(optionAnswer(o))}">${esc(o.label||o.k)}${card.rec&&String(card.rec.k)===String(o.k)?`<span class="tap">recommended · ${esc(card.rec.reason||"")}</span>`:""}</button>`).join("");stage.innerHTML=`<div class="hero question"><span class="eyebrow">${esc(card.priority||"decision")}</span><h2>${esc(card.question)}</h2><p>${esc(card.why||"")}</p><div id="choices">${choices}</div>${options.length?"":`<input id="text-answer" type="${card.answer_type==="number"?"number":"text"}" placeholder="${esc(card.format||"Type or dictate")}"><button id="submit-text">Record decision</button>`}<details style="margin-top:12px"><summary>note for the record</summary><input id="decision-note" placeholder="optional context"></details><button id="later">Later</button><div id="decision-error" style="color:var(--red);margin-top:10px"></div></div>`;stage.querySelectorAll("[data-value]").forEach(b=>b.onclick=()=>submit(card,b.dataset.value));const text=$("#submit-text");if(text)text.onclick=()=>{const v=$("#text-answer").value.trim();if(v)submit(card,card.answer_type==="number"?Number(v):v)};const m=$("#submit-multi");if(m)m.onclick=()=>{const picked=[...stage.querySelectorAll("[data-multi]:checked")].map(x=>x.dataset.multi);if(picked.length)submit(card,picked.join(" + "))};$("#later").onclick=async()=>{if(S.busy)return;S.busy=true;try{await api("/api/card-action",{method:"POST",body:JSON.stringify({qid:card.id,action:"later"})});await renderDecisions()}catch(e){$("#decision-error").textContent="Not deferred. This card stayed here."}finally{S.busy=false}}}
async function submit(card,value){if(S.busy)return;S.busy=true;const stage=$("#decision-stage"),err=$("#decision-error"),note=$("#decision-note")?.value.trim()||"";stage.querySelectorAll("button,input").forEach(x=>x.disabled=true);if(err)err.textContent="Saving safely…";try{const r=await api("/api/answer",{method:"POST",body:JSON.stringify({qid:card.id,answer:value,note})});if(!r.ok)throw Error(r.error||"not accepted");await boot(false);show("decisions",false)}catch(e){stage.querySelectorAll("button,input").forEach(x=>x.disabled=false);if(err)err.textContent="Not recorded. Your card stayed here — tap again when connected."}finally{S.busy=false}}
async function boot(reveal=true){try{connection("retrying","connecting");const [app,cards]=await Promise.all([api("/api/app-state"),api("/api/cards?campaign="+CAMPAIGN)]);S.app=app;S.cards=cards;renderWorld();renderFocus();$("#fatal").classList.remove("show");const initial=(location.hash||"#world").slice(1);show(initial,false)}catch(e){if(!$("#pair").classList.contains("show"))$("#fatal").classList.add("show")}}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>show(b.dataset.go));$("#primary-region").onclick=()=>show("focus");$("#retry").onclick=()=>boot();addEventListener("popstate",()=>show((location.hash||"#world").slice(1),false));addEventListener("online",()=>boot(false));boot();
</script></body></html>
