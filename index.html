<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI-OS">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<title>AI-OS</title>
<style>
  :root{--bg:#07070b;--ink:#ede9df;--ink2:#a9a49b;--jade:#4cc492;--gold:#d4b177;--line:rgba(237,233,223,.13);
    --mono:"Cascadia Mono",Consolas,ui-monospace,monospace;--serif:Constantia,"Palatino Linotype",Georgia,serif}
  *{box-sizing:border-box;margin:0} html,body{min-height:100%}
  body{background:radial-gradient(120% 60% at 50% -20%,rgba(76,196,146,.13),transparent 60%),
    linear-gradient(180deg,#0b0b12,var(--bg) 40%);min-height:100vh;color:var(--ink);
    font-family:var(--serif);display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;text-align:center;padding:24px}
  .mark{font-size:34px;letter-spacing:.5px}.mark em{font-style:italic;color:var(--gold);font-size:24px}
  .ring{width:52px;height:52px;border-radius:50%;border:3px solid rgba(76,196,146,.25);border-top-color:var(--jade);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #msg{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--ink2);max-width:360px;line-height:1.7}
  .panel{width:min(390px,100%);border:1px solid var(--line);border-radius:22px;padding:20px;background:rgba(255,255,255,.035);box-shadow:0 24px 60px rgba(0,0,0,.28)}
  .code{font-family:var(--mono);font-size:34px;letter-spacing:.18em;color:var(--gold);margin:8px 0 10px}
  .hint{font-family:var(--mono);font-size:12px;line-height:1.65;color:var(--ink2)}
  .hint strong{color:var(--ink);font-weight:600}
  button{margin-top:8px;padding:12px 22px;border-radius:12px;border:1px solid rgba(212,177,119,.5);cursor:pointer;
    background:linear-gradient(180deg,#ecd6a4,var(--gold));color:#191509;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  .ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
</style>
</head>
<body>
<div class="mark">AI-OS <em>console</em></div>
<div class="ring" id="ring"></div>
<div id="msg">connecting&hellip;</div>
<div id="pair" class="panel" style="display:none"></div>
<div class="row"><button id="retry" onclick="go()" style="display:none">Retry</button></div>
<script>
"use strict";
// Stable entry point. The PC's tunnel supervisor pushes the current console
// address into url.json whenever it changes. The access token is never stored
// in this public repo. Existing devices keep it in localStorage; new phones
// use a short pairing code approved from the already-trusted console side.
var TOKEN_KEY="aios_token", DEVICE_KEY="aios_device", PANE_KEY="aios_pane";
var PAIR_CODE_KEY="aios_pair_code", PAIR_AT_KEY="aios_pair_created_at";
var pairTimer=null, currentTunnel=null;
function $(id){return document.getElementById(id)}
function setBusy(on){$("ring").style.display=on?"":"none"}
function sanitizePane(v){v=String(v||"").replace(/[^A-Za-z0-9_-]/g,"");return v||"owneros"}
function wantsBarb(){
  var h=(location.hash||"").replace(/^#/,""); if(!h)return false;
  var params=new URLSearchParams(h.indexOf("=")>=0?h:("pane="+encodeURIComponent(h)));
  return sanitizePane(params.get("pane")||"")==="barb";
}
function parseHash(){
  var h=(location.hash||"").replace(/^#/,""); if(!h)return;
  var params=new URLSearchParams(h.indexOf("=")>=0?h:("pane=" + encodeURIComponent(h)));
  var tok=params.get("t"); var pane=sanitizePane(params.get("pane")||"");
  if(tok&&/^[A-Za-z0-9]+$/.test(tok)){try{localStorage.setItem(TOKEN_KEY,tok)}catch(e){}}
  if(pane){try{localStorage.setItem(PANE_KEY,pane)}catch(e){}}
  if(tok||pane){history.replaceState(null,"",location.pathname)}
}
function getDevice(){
  var d=null; try{d=localStorage.getItem(DEVICE_KEY)}catch(e){}
  if(!d){d=(crypto.randomUUID?crypto.randomUUID():(Date.now()+"-"+Math.random())).replace(/[^A-Za-z0-9._-]/g,""); try{localStorage.setItem(DEVICE_KEY,d)}catch(e){}}
  return d;
}
function makeCode(){
  var chars="ABCDEFGHJKMNPQRSTUVWXYZ23456789", a=new Uint8Array(6), out="";
  crypto.getRandomValues(a); for(var i=0;i<a.length;i++)out+=chars[a[i]%chars.length]; return out;
}
function clearPairCode(){try{localStorage.removeItem(PAIR_CODE_KEY);localStorage.removeItem(PAIR_AT_KEY)}catch(e){}}
function getPairCode(){
  var code=null, created=0, now=Date.now();
  try{code=localStorage.getItem(PAIR_CODE_KEY);created=Number(localStorage.getItem(PAIR_AT_KEY)||0)}catch(e){}
  if(code&&/^[A-Z0-9]{6}$/.test(code)&&created&&now-created<9*60*1000)return code;
  code=makeCode(); try{localStorage.setItem(PAIR_CODE_KEY,code);localStorage.setItem(PAIR_AT_KEY,String(now))}catch(e){} return code;
}
function showFail(msg){setBusy(false);$("msg").innerHTML=msg;$("retry").style.display="inline-block";}
function fetchTunnel(){return fetch("url.json?x="+Date.now(),{cache:"no-store"}).then(function(r){return r.json()}).then(function(d){if(!d.url)throw new Error("no console address published yet"); currentTunnel=d.url.replace(/\/+$/,""); return currentTunnel;});}
function redirectWithToken(tok,pane){pane=sanitizePane(pane||localStorage.getItem(PANE_KEY)||"owneros"); try{localStorage.setItem(TOKEN_KEY,tok);localStorage.setItem(PANE_KEY,pane)}catch(e){} if(pane==="app"){location.replace(new URL("app/",location.href).href);return;} if(pane==="frontier"){location.replace(new URL("frontier/",location.href).href);return;} if(pane==="world"){location.replace(currentTunnel+"/t/"+tok+"/world");return;} location.replace(currentTunnel+"/t/"+tok+"/#"+pane);}
function startPair(){
  setBusy(false); $("retry").style.display="none"; $("msg").textContent="pair this phone once";
  var code=getPairCode(), device=getDevice(), pane=sanitizePane(localStorage.getItem(PANE_KEY)||"owneros");
  $("pair").style.display="block";
  $("pair").innerHTML='<div class="hint">Send this code to Hermes:</div><div class="code">'+code+'</div><div class="hint"><strong>PAIR '+code+'</strong><br>Return to this same page after approval. The code stays valid for this phone.</div><div class="row"><button onclick="copyPair(\''+code+'\')">Copy code</button><button class="ghost" onclick="go()">Check again</button></div>';
  fetch(currentTunnel+"/api/pair/request",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:code,device:device,pane:pane})})
    .then(function(r){return r.json()}).then(function(d){if(!d.ok)throw new Error(d.error||"pair request failed"); pollPair(code,device);})
    .catch(function(e){showFail("pair request failed — retry after the PC tunnel is awake.<br>"+String(e.message||e));});
}
function pollPair(code,device){
  clearInterval(pairTimer);
  function check(){
    fetch(currentTunnel+"/api/pair/status?code="+encodeURIComponent(code)+"&device="+encodeURIComponent(device),{cache:"no-store"})
      .then(function(r){return r.json()}).then(function(d){
        if(d.approved&&d.token){clearInterval(pairTimer);clearPairCode();redirectWithToken(d.token,d.pane);return;}
        if(d.pending===false){clearInterval(pairTimer);clearPairCode();startPair();}
      }).catch(function(){});
  }
  check(); pairTimer=setInterval(check,2500);
}
function copyPair(code){try{navigator.clipboard.writeText("PAIR "+code)}catch(e){} }
function go(){
  clearInterval(pairTimer); $("pair").style.display="none"; $("retry").style.display="none"; setBusy(true); $("msg").textContent="connecting…";
  if(wantsBarb()){location.replace(new URL("barb/",location.href).href);return;}
  parseHash();
  fetchTunnel().then(function(){
    var t=null; try{t=localStorage.getItem(TOKEN_KEY)}catch(e){}
    if(!t)return startPair();
    redirectWithToken(t,localStorage.getItem(PANE_KEY)||"owneros");
  }).catch(function(){showFail("can't reach the address file — check connection, then retry. if the PC just restarted, the new address lands here within ~1 minute.");});
}
go();
</script>
</body>
</html>
